<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT & BWL Komplett-Quiz</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e2937;
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #312e81);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        header {
            background: var(--dark);
            color: white;
            padding: 25px;
            text-align: center;
        }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        .subtitle { opacity: 0.85; font-size: 1.05rem; }
        .total-badge {
            display: inline-block;
            background: var(--success);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .quiz-nav {
            padding: 15px 25px;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        select {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 0.95rem;
            background: white;
            cursor: pointer;
        }

        .stats { display: flex; gap: 20px; font-weight: bold; }

        .question-container {
            padding: 30px;
            min-height: 420px;
        }

        .question-number {
            background: #e0f2fe;
            color: var(--dark);
            padding: 5px 14px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .category-tag {
            background: #fef3c7;
            color: #92400e;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-left: 10px;
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 22px;
            color: var(--dark);
        }

        .answers-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .answer-option {
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .answer-option:hover {
            background: #f1f5f9;
            border-color: var(--primary);
        }

        .answer-option.selected {
            border-color: var(--primary);
            background: #eff6ff;
        }

        .answer-option.correct {
            border-color: var(--success);
            background: #f0fdf4;
        }

        .answer-option.incorrect {
            border-color: var(--danger);
            background: #fef2f2;
        }

        .answer-letter {
            width: 34px; height: 34px;
            background: #e2e8f0;
            color: #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            font-size: 0.95rem;
        }

        .feedback {
            margin-top: 18px;
            padding: 16px;
            border-radius: 10px;
            display: none;
            line-height: 1.5;
        }

        .feedback.correct { background:#ecfdf5; color:#166534; border-left:5px solid var(--success); }
        .feedback.incorrect { background:#fef2f2; color:#991b1b; border-left:5px solid var(--danger); }

        .navigation-buttons {
            padding: 18px 30px;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 11px 26px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .prev-btn { background:#e2e8f0; }
        .prev-btn:hover { background:#cbd5e1; }
        .next-btn { background:var(--primary); color:white; }
        .next-btn:hover { background:#2563eb; }
        .submit-btn { background:#16a34a; color:white; }
        .submit-btn:hover { background:#15803d; }

        .results-screen {
            padding: 50px 30px;
            text-align: center;
            display: none;
        }

        .score-circle {
            width: 180px; height: 180px;
            margin: 20px auto;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .result-label { font-size: 1.1rem; opacity: 0.9; margin-top: 5px; }

        .result-message { font-size: 1.4rem; margin: 15px 0; color: var(--dark); }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            transition: width 0.5s;
        }

        @media (max-width: 600px) {
            .quiz-nav { flex-direction: column; align-items: stretch; }
            .stats { justify-content: center; }
            .navigation-buttons { flex-direction: column; gap: 10px; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>IT & BWL Komplett-Quiz</h1>
            <p class="subtitle">Alle Fragen — Hardware, Netzwerk, Cloud, Recht, BWL, Projekt, Arbeitsschutz</p>
            <span class="total-badge" id="totalBadge">110 Fragen</span>
        </header>

        <div class="quiz-nav">
            <select id="categoryFilter">
                <option value="all">Alle Kategorien</option>
                <option value="hardware">Hardware</option>
                <option value="netzwerk">Netzwerk & Cloud</option>
                <option value="recht">Recht & Wirtschaft</option>
                <option value="projekt">Projektmanagement</option>
                <option value="industrie">Industrie 4.0</option>
                <option value="arbeitsschutz">Arbeitsschutz</option>
                <option value="berechnung">Berechnungen</option>
                <option value="bwl">BWL & Handel</option>
            </select>
            <div class="stats">
                <span>Frage <strong id="current">1</strong>/<strong id="total">110</strong></span>
                <span>✅ <strong id="score">0</strong></span>
            </div>
        </div>

        <div id="questionContainer" class="question-container"></div>

        <div class="navigation-buttons">
            <button class="prev-btn" id="prevBtn" onclick="prevQuestion()">← Zurück</button>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Weiter →</button>
        </div>

        <div id="resultsContainer" class="results-screen"></div>
    </div>

    <script>
        const quizData = [
            /* ======================== HARDWARE ======================== */
            { id:1, category:"hardware", question:"Nennen Sie 3 Pioniere der Computertechnik.", options:[{text:"Konrad Zuse, Alan Turing, John von Neumann",correct:true},{text:"Bill Gates, Steve Jobs, Mark Zuckerberg",correct:false},{text:"Tim Berners-Lee, Vint Cerf, Linus Torvalds",correct:false},{text:"Albert Einstein, Nikola Tesla, Thomas Edison",correct:false}], explanation:"Konrad Zuse (erster Computer), Alan Turing (theoretische Grundlagen), John von Neumann (Architektur)."},
            { id:2, category:"hardware", question:"Was beschreibt die Von-Neumann-Architektur?", options:[{text:"Daten und Programme liegen im selben Speicher",correct:true},{text:"Trennung von Befehls- und Datenspeicher (Harvard-Architektur)",correct:false},{text:"Verarbeitung von Daten ausschließlich in der Cloud",correct:false},{text:"Eine parallele Verarbeitung auf mehreren Grafikkernen",correct:false}], explanation:"Programme und Daten befinden sich im gleichen Speicher — das Grundprinzip moderner Computer."},
            { id:3, category:"hardware", question:"Welches ist das wichtigste Basismaterial für die Chipherstellung?", options:[{text:"Silizium",correct:true},{text:"Kupfer",correct:false},{text:"Gold",correct:false},{text:"Aluminium",correct:false}], explanation:"Silizium ist das wichtigste Halbleitermaterial für die Chipfertigung."},
            { id:4, category:"hardware", question:"Welche sind die drei Hauptbestandteile der CPU?", options:[{text:"Rechenwerk (ALU), Steuerwerk, Register",correct:true},{text:"RAM, ROM, Cache",correct:false},{text:"BIOS, UEFI, TPM",correct:false},{text:"GPU, NPU, APU",correct:false}], explanation:"ALU, Steuerwerk und Register sind die Kernkomponenten der CPU."},
            { id:5, category:"hardware", question:"Was bedeutet OEM?", options:[{text:"Original Equipment Manufacturer",correct:true},{text:"Open Enterprise Management",correct:false},{text:"Optical Electronic Module",correct:false},{text:"Online Equipment Monitor",correct:false}], explanation:"OEM = Hersteller von Originalausstattung für andere Marken."},
            { id:6, category:"hardware", question:"Welche drei Formfaktoren von Motherboards gibt es?", options:[{text:"ATX, Micro-ATX, Mini-ITX",correct:true},{text:"Full-ATX, Half-ATX, Quarter-ATX",correct:false},{text:"Type A, Type B, Type C",correct:false},{text:"Standard, Gaming, Workstation",correct:false}], explanation:"ATX (Standard), Micro-ATX (kompakt), Mini-ITX (sehr klein)."},
            { id:7, category:"hardware", question:"Was ist ein Thin-Client?", options:[{text:"Ein Client-Computer, der Anwendungen zentral vom Server bezieht",correct:true},{text:"Ein besonders leistungsstarker Laptop für Grafikbearbeitung",correct:false},{text:"Ein eigenständiger PC ohne Netzwerkverbindung",correct:false},{text:"Ein Tablet mit integrierter Tastatur",correct:false}], explanation:"Thin-Clients sind schlanke Endgeräte, die Anwendungen vom Server beziehen."},
            { id:8, category:"hardware", question:"Was bedeutet RAM?", options:[{text:"Random Access Memory — der Arbeitsspeicher",correct:true},{text:"Read Access Memory — Nur-Lese-Speicher",correct:false},{text:"Rapid Access Module",correct:false},{text:"Redundant Array of Memory",correct:false}], explanation:"RAM ist der flüchtige Arbeitsspeicher."},
            { id:9, category:"hardware", question:"Welches Cache-Level ist das schnellste?", options:[{text:"L1-Cache",correct:true},{text:"L2-Cache",correct:false},{text:"L3-Cache",correct:false},{text:"L4-Cache",correct:false}], explanation:"L1-Cache sitzt direkt im CPU-Kern und ist am schnellsten."},
            { id:10, category:"hardware", question:"Was macht das BIOS bzw. UEFI?", options:[{text:"Initialisiert die Hardware und startet das Betriebssystem",correct:true},{text:"Es scannt das System dauerhaft nach Viren",correct:false},{text:"Es verwaltet ausschließlich die Grafikausgabe",correct:false},{text:"Es dient primär der Lüftersteuerung im Betrieb",correct:false}], explanation:"BIOS/UEFI ist die erste Software, die beim Einschalten ausgeführt wird."},
            { id:11, category:"hardware", question:"Was bedeutet TLC bei Flash-Speichern?", options:[{text:"Triple-Level-Cell — 3 Bit pro Speicherzelle",correct:true},{text:"Total Logical Cache",correct:false},{text:"Temporary Load Control",correct:false},{text:"Triple Layer Chip",correct:false}], explanation:"TLC speichert 3 Bit pro Zelle — weniger haltbar, aber günstiger als SLC/MLC."},
            { id:12, category:"hardware", question:"Was verstehen Sie unter dem Begriff Chipsatz?", options:[{text:"Steuerlogik, die die Kommunikation zwischen CPU, RAM und Peripherie regelt",correct:true},{text:"Die Gesamtheit aller auf dem Mainboard verlöteten Prozessoren",correct:false},{text:"Ein Modul zur Erweiterung des Arbeitsspeichers",correct:false},{text:"Der Grafikprozessor auf der Hauptplatine",correct:false}], explanation:"Der Chipsatz verbindet und koordiniert die Hauptkomponenten."},
            { id:13, category:"hardware", question:"Was verstehen Sie unter JEDEC?", options:[{text:"Ein Normungsgremium für Halbleiter- und Speicherstandards",correct:true},{text:"Eine Programmiersprache",correct:false},{text:"Ein Netzwerkprotokoll",correct:false},{text:"Ein Chip-Hersteller",correct:false}], explanation:"JEDEC entwickelt Standards für Halbleiterbauelemente und Speicher."},
            { id:14, category:"hardware", question:"Was verstehen Sie unter NAS?", options:[{text:"Network Attached Storage — netzwerkgebundener Speicher",correct:true},{text:"Ein Netzwerkprotokoll",correct:false},{text:"Ein Betriebssystem",correct:false},{text:"Eine Datenbankart",correct:false}], explanation:"NAS ist ein spezieller Dateiserver im Netzwerk."},
            { id:15, category:"hardware", question:"Was ist ein Embedded-System?", options:[{text:"Ein in ein Gerät eingebettetes Computersystem für eine spezielle Aufgabe",correct:true},{text:"Ein Hochleistungsserver für Datenbankanwendungen",correct:false},{text:"Ein PC, der in einem Schrank eingebaut ist",correct:false},{text:"Ein virtuelles Betriebssystem in der Cloud",correct:false}], explanation:"Eingebettete Systeme erfüllen eine fest definierte Funktion."},
            { id:16, category:"hardware", question:"Was bedeutet Pipelining?", options:[{text:"Überlappende Verarbeitung mehrerer Befehlsphasen in der CPU",correct:true},{text:"Die serielle Abarbeitung von Befehlen nacheinander",correct:false},{text:"Eine Methode zur parallelen Datenspeicherung",correct:false},{text:"Die Verbindung zweier Netzwerkkabel",correct:false}], explanation:"Pipelining erhöht den Durchsatz, indem Befehlsphasen parallel arbeiten."},
            { id:17, category:"hardware", question:"Nennen Sie 3 typische Schadsoftwarearten.", options:[{text:"Virus, Wurm, Trojaner",correct:true},{text:"Firewall, Antivirus, Backup",correct:false},{text:"Browser, Mailclient, Editor",correct:false},{text:"Treiber, Plugin, App",correct:false}], explanation:"Virus, Wurm und Trojaner sind klassische Schadsoftwaretypen."},
            { id:18, category:"hardware", question:"Was ist eine Anti-Spy-Folie?", options:[{text:"Eine Sichtschutzfolie, die seitliches Mitlesen vom Display erschwert",correct:true},{text:"Eine Folie gegen Kratzer",correct:false},{text:"Eine Folie zur Verbesserung der Farbdarstellung",correct:false},{text:"Eine magnetische Abschirmfolie",correct:false}], explanation:"Die Folie verengt den Blickwinkel auf das Display."},
            { id:19, category:"hardware", question:"Nennen Sie 2 technische Verfahren bei Tintenstrahldruckern.", options:[{text:"Thermisches Verfahren (Bubble-Jet) und Piezo-Verfahren",correct:true},{text:"Laser- und LED-Verfahren",correct:false},{text:"Nadeldruck und Thermodirekt",correct:false},{text:"Sublimation und Solid-Ink",correct:false}], explanation:"Thermisch nutzt Hitze, Piezo nutzt elektrische Spannung an Kristallen."},
            { id:20, category:"hardware", question:"Nennen Sie 2 Scannerarten und deren bevorzugte Einsatzgebiete.", options:[{text:"Flachbettscanner (Fotos, Bücher) und Einzugsscanner (lose Blätter, Archivierung)",correct:true},{text:"3D-Scanner (Architektur) und Handscanner (Lager)",correct:false},{text:"Laserscanner (Sicherheit) und Strichcodescanner (Kasse)",correct:false},{text:"Diascanner (Filme) und Scheckscanner (Banken)",correct:false}], explanation:"Flachbett für gebundene Vorlagen, Einzug für Massendigitalisierung."},
            { id:21, category:"hardware", question:"Welche Displayarten kennen Sie?", options:[{text:"TN, VA, IPS, OLED",correct:true},{text:"LCD, LED, Neon, Plasma",correct:false},{text:"CRT, TFT, LCD, DLP",correct:false},{text:"HD, Full HD, 4K, 8K",correct:false}], explanation:"TN, VA und IPS sind LCD-Varianten, OLED ist eine eigene Technologie."},
            { id:22, category:"hardware", question:"Welche Nachteile hat ein VA-Panel?", options:[{text:"Langsamere Reaktionszeit und mögliche Schlieren (Black Smearing)",correct:true},{text:"Extrem geringer Kontrast im Vergleich zu TN",correct:false},{text:"Sehr schlechte Schwarzwerte",correct:false},{text:"Geringe Blickwinkelstabilität wie bei TN",correct:false}], explanation:"VA hat bessere Kontraste als IPS, aber langsamere Reaktionszeit."},
            { id:23, category:"hardware", question:"Welche Vorteile hat ein IPS-Panel?", options:[{text:"Sehr gute Blickwinkel und naturgetreue Farbdarstellung",correct:true},{text:"Extrem hoher Kontrast und tiefes Schwarz wie OLED",correct:false},{text:"Die schnellsten Schaltzeiten aller Panel-Typen",correct:false},{text:"Die kostengünstigste Herstellung",correct:false}], explanation:"IPS ist ideal für Farb- und Bildbearbeitung."},
            { id:24, category:"hardware", question:"Welche maximale Auflösung bietet HDMI 2.0?", options:[{text:"4K / UHD mit 60 Hz (3840 × 2160)",correct:true},{text:"8K mit 60 Hz",correct:false},{text:"2560 × 1440 mit 144 Hz",correct:false},{text:"Full HD mit 240 Hz",correct:false}], explanation:"HDMI 2.0 unterstützt bis zu 4K60."},
            { id:25, category:"hardware", question:"Was verstehen Sie unter Refurbishing?", options:[{text:"Professionelle Wiederaufbereitung gebrauchter IT-Geräte",correct:true},{text:"Recycling von Elektroschrott",correct:false},{text:"Neuentwicklung von Hardware",correct:false},{text:"Verschrottung alter Geräte",correct:false}], explanation:"Refurbishing umfasst Reinigung, Prüfung, Austausch und Wieder Verkauf."},
            { id:26, category:"hardware", question:"Was verstehen Sie unter IT-Rollback?", options:[{text:"Rückkehr auf einen vorherigen System- oder Versionsstand",correct:true},{text:"Die Aktualisierung der Firmware",correct:false},{text:"Das Löschen aller Daten",correct:false},{text:"Die Neuinstallation des Betriebssystems",correct:false}], explanation:"Rollback wird bei fehlgeschlagenen Updates oder Änderungen eingesetzt."},

            /* ======================== NETZWERK & CLOUD ======================== */
            { id:27, category:"netzwerk", question:"Was bedeutet ERP?", options:[{text:"Enterprise Resource Planning — Planung aller Unternehmensressourcen",correct:true},{text:"Electronic Data Processing",correct:false},{text:"Extended Routing Protocol",correct:false},{text:"Efficient Resource Processing",correct:false}], explanation:"ERP-Systeme integrieren alle zentralen Geschäftsprozesse."},
            { id:28, category:"netzwerk", question:"Was bedeutet Low-Code-Programmierung?", options:[{text:"Entwicklung mit visuellen Tools und sehr wenig manuellem Code",correct:true},{text:"Programmieren in Maschinensprache für Performance",correct:false},{text:"Entwicklung ausschließlich für mobile Endgeräte",correct:false},{text:"Nutzung veralteter Programmiersprachen",correct:false}], explanation:"Low-Code nutzt Drag-and-Drop und vorgefertigte Bausteine."},
            { id:29, category:"netzwerk", question:"Was bedeutet Abwärtskompatibilität?", options:[{text:"Neue Systeme können ältere Daten, Formate oder Hardware weiter nutzen",correct:true},{text:"Software kann nur auf neuer Hardware ausgeführt werden",correct:false},{text:"Alte Systeme werden automatisch auf neue Versionen geupdatet",correct:false},{text:"Daten werden automatisch in die Cloud verschoben",correct:false}], explanation:"Abwärtskompatibilität sichert die Nutzung älterer Ressourcen."},
            { id:30, category:"netzwerk", question:"Was bedeutet On-Premises?", options:[{text:"IT-Infrastruktur wird im eigenen Rechenzentrum betrieben",correct:true},{text:"Ausschließliche Nutzung von Public-Cloud-Diensten",correct:false},{text:"Bereitstellung von Arbeitsplätzen im Homeoffice",correct:false},{text:"Auslagerung der IT an einen externen Dienstleister",correct:false}], explanation:"On-Premises = Betrieb „vor Ort\" im eigenen Haus."},
            { id:31, category:"netzwerk", question:"Was bedeutet MAN?", options:[{text:"Metropolitan Area Network — stadtweites Netz",correct:true},{text:"Main Area Network",correct:false},{text:"Multiple Access Network",correct:false},{text:"Managed Area Network",correct:false}], explanation:"MAN verbindet Netzwerke in einer Stadt oder Region."},
            { id:32, category:"netzwerk", question:"Was bedeutet SaaS?", options:[{text:"Software as a Service — Software wird über das Internet bereitgestellt",correct:true},{text:"System as a Service — Hardwaremiete per Post",correct:false},{text:"Storage as a Service — reiner Speicherplatz",correct:false},{text:"Server as a Service — Miete physischer Server",correct:false}], explanation:"SaaS = Software wird als gehosteter Dienst genutzt."},
            { id:33, category:"netzwerk", question:"Was bedeutet PaaS?", options:[{text:"Platform as a Service — Entwicklungsumgebung aus der Cloud",correct:true},{text:"Processing as a Service",correct:false},{text:"Power as a Service",correct:false},{text:"Private as a Service",correct:false}], explanation:"PaaS bietet eine Plattform für Entwicklung, Test und Betrieb."},
            { id:34, category:"netzwerk", question:"Was bedeutet DaaS?", options:[{text:"Desktop as a Service — virtuelle Desktops aus der Cloud",correct:true},{text:"Data as a Service",correct:false},{text:"Development as a Service",correct:false},{text:"Disaster as a Service",correct:false}], explanation:"DaaS liefert komplette Desktop-Umgebungen aus der Cloud."},
            { id:35, category:"netzwerk", question:"Was bedeutet VDI?", options:[{text:"Virtual Desktop Infrastructure",correct:true},{text:"Virtual Data Interface",correct:false},{text:"Very Dynamic Integration",correct:false},{text:"Video Display Input",correct:false}], explanation:"VDI ist die Bereitstellung virtueller Desktop-Instanzen."},
            { id:36, category:"netzwerk", question:"Was ist ein Cloud-Client?", options:[{text:"Endgerät oder Programm, das Cloud-Dienste nutzt",correct:true},{text:"Ein lokaler Server ohne Internetverbindung",correct:false},{text:"Eine Datenbank, die offline arbeitet",correct:false},{text:"Ein physisches Speichermedium",correct:false}], explanation:"Cloud-Clients können Browser, Apps oder Thin Clients sein."},
            { id:37, category:"netzwerk", question:"Was ist eine private Cloud?", options:[{text:"Cloud-Umgebung, die nur einem Unternehmen zur Verfügung steht",correct:true},{text:"Eine Cloud-Lösung für private Endanwender",correct:false},{text:"Ein öffentliches Netzwerk für jedermann",correct:false},{text:"Ein kostenloser Cloud-Dienst im Internet",correct:false}], explanation:"Private Clouds bieten maximale Kontrolle und Sicherheit."},
            { id:38, category:"netzwerk", question:"Was ist eine Hybrid Cloud?", options:[{text:"Kombination aus privater und öffentlicher Cloud",correct:true},{text:"Nur private Cloud",correct:false},{text:"Nur öffentliche Cloud",correct:false},{text:"Eine Cloud mit zwei Rechenzentren",correct:false}], explanation:"Hybrid Cloud verbindet die Vorteile beider Modelle."},
            { id:39, category:"netzwerk", question:"Was bedeutet RFID?", options:[{text:"Radio Frequency Identification — kontaktlose Identifikation per Funk",correct:true},{text:"Remote File Integration and Deployment",correct:false},{text:"Rapid File Data Network",correct:false},{text:"Realtime Frequency Identification",correct:false}], explanation:"RFID wird z. B. bei Zugangssystemen und Warenwirtschaft eingesetzt."},
            { id:40, category:"netzwerk", question:"Was verstehen Sie unter IT-Outsourcing?", options:[{text:"Auslagerung von IT-Aufgaben an externe Dienstleister",correct:true},{text:"Vollständige interne Abwicklung aller IT-Prozesse",correct:false},{text:"Rekrutierung neuer interner IT-Mitarbeiter",correct:false},{text:"Kauf von neuer Hardware für die eigene Abteilung",correct:false}], explanation:"Outsourcing überträgt IT-Aufgaben an spezialisierte Partner."},
            { id:41, category:"netzwerk", question:"Was bedeutet On-Site-Management?", options:[{text:"IT-Betreuung und -Management vor Ort beim Kunden",correct:true},{text:"Fernwartung über das Internet",correct:false},{text:"Verwaltung der Cloud-Infrastruktur",correct:false},{text:"Installation von Software vor Ort",correct:false}], explanation:"On-Site = am Standort des Kunden / vor Ort."},
            { id:42, category:"netzwerk", question:"Was verstehen Sie unter SLAs?", options:[{text:"Service Level Agreements — vertraglich vereinbarte Servicequalität",correct:true},{text:"Software License Agreements",correct:false},{text:"System Level Architecture",correct:false},{text:"Secure Local Area",correct:false}], explanation:"SLAs regeln Verfügbarkeit, Reaktionszeiten und Support."},

            /* ======================== NEW HARDWARE QUESTIONS ======================== */
            { id:111, category:"hardware", question:"Was charakterisiert die NAND-Flash-Technologie?", options:[{text:"Nicht-flüchtiger Speicher mit Floating-Gate-Transistoren, der Daten auch ohne Stromspeisung behält",correct:true},{text:"Flüchtiger Arbeitsspeicher mit DRAM-Zellen für temporäre Datenspeicherung",correct:false},{text:"Magnetischer Speicher mit rotierenden Platten für sequentiellen Datenzugriff",correct:false},{text:"Optischer Speicher mit Lasertechnologie für langfristige Archivierung",correct:false}], explanation:"NAND-Flash nutzt Floating-Gate-Transistoren für nicht-flüchtige Speicherung."},

        let currentIndex = 0;
        let score = 0;
        let selectedAnswers = new Array(quizData.length).fill(null);
        let filteredData = [...quizData];

        const qContainer = document.getElementById("questionContainer");
        const currentEl = document.getElementById("current");
        const totalEl = document.getElementById("total");
        const scoreEl = document.getElementById("score");
        const totalBadge = document.getElementById("totalBadge");
        const categoryFilter = document.getElementById("categoryFilter");

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function filterQuestions() {
            const cat = categoryFilter.value;
            filteredData = cat === "all" ? [...quizData] : quizData.filter(q => q.category === cat);

            shuffleArray(filteredData);
            filteredData.forEach(q => shuffleArray(q.options));

            currentIndex = 0;
            score = 0;
            selectedAnswers = new Array(filteredData.length).fill(null);
            totalEl.textContent = filteredData.length;
            totalBadge.textContent = filteredData.length + " Fragen";
            scoreEl.textContent = score;
            showQuestion();
        }

        function showQuestion() {
            if (filteredData.length === 0) {
                qContainer.innerHTML = '<p style="text-align:center;padding:40px;">Keine Fragen in dieser Kategorie.</p>';
                return;
            }
            const q = filteredData[currentIndex];
            currentEl.textContent = currentIndex + 1;

            let html = `<div class="question-number">Frage ${currentIndex + 1} / ${filteredData.length}<span class="category-tag">${q.category}</span></div>`;
            html += `<div class="question-text">${q.question}</div><div class="answers-container">`;

            const letters = ["A","B","C","D"];
            q.options.forEach((opt, i) => {
                let cls = "answer-option";
                if (selectedAnswers[currentIndex] === i) cls += " selected";
                html += `<div class="${cls}" onclick="selectOption(${i})">
                    <div class="answer-letter">${letters[i]}</div>
                    <div>${opt.text}</div>
                </div>`;
            });
            html += `</div><div id="feedback" class="feedback"></div>`;
            qContainer.innerHTML = html;
            updateFeedback();
            updateNavButtons();
        }

        window.selectOption = function(index) {
            selectedAnswers[currentIndex] = index;
            const q = filteredData[currentIndex];
            if (q.options[index].correct) score++;
            scoreEl.textContent = score;
            showQuestion();
        };

        function updateFeedback() {
            const fb = document.getElementById("feedback");
            const selected = selectedAnswers[currentIndex];
            if (selected === null) return;
            const q = filteredData[currentIndex];
            const isCorrect = q.options[selected].correct;
            fb.style.display = "block";
            fb.className = isCorrect ? "feedback correct" : "feedback incorrect";
            fb.innerHTML = isCorrect ? 
                `<strong>✅ Richtig!</strong><br>${q.explanation}` : 
                `<strong>❌ Falsch!</strong><br>${q.explanation}`;
        }

        function updateNavButtons() {
            document.getElementById("prevBtn").disabled = currentIndex === 0;
            const nextBtn = document.getElementById("nextBtn");
            if (currentIndex === filteredData.length - 1) {
                nextBtn.textContent = "Ergebnis";
                nextBtn.className = "submit-btn";
                nextBtn.onclick = showResults;
            } else {
                nextBtn.textContent = "Weiter →";
                nextBtn.className = "next-btn";
                nextBtn.onclick = nextQuestion;
            }
        }

        window.nextQuestion = function() {
            if (currentIndex < filteredData.length - 1) {
                currentIndex++;
                showQuestion();
            }
        };

        window.prevQuestion = function() {
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
            }
        };

        function showResults() {
            const percent = Math.round((score / filteredData.length) * 100);
            let message = percent >= 90 ? "Ausgezeichnet! 🎉" : 
                          percent >= 75 ? "Sehr gut! 👍" : 
                          percent >= 60 ? "Gut gemacht! ✅" : 
                          percent >= 50 ? "Bestanden. 📚" : "Noch Übungsbedarf. 💪";

            document.querySelector(".navigation-buttons").style.display = "none";
            qContainer.style.display = "none";

            const resultsContainer = document.getElementById("resultsContainer");
            resultsContainer.style.display = "block";
            resultsContainer.innerHTML = `
                <h2>Quiz abgeschlossen!</h2>
                <div class="score-circle">
                    ${percent}%
                    <div class="result-label">${score} / ${filteredData.length}</div>
                </div>
                <div class="result-message">${message}</div>
                <p>Sie haben <strong>${score}</strong> von <strong>${filteredData.length}</strong> Fragen richtig beantwortet.</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" style="width:${percent}%"></div>
                </div>
                <button onclick="location.reload()" style="margin-top:30px;padding:14px 32px;font-size:1.05rem;background:#3b82f6;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;">
                    Quiz neu starten
                </button>`;
        }

        categoryFilter.addEventListener("change", filterQuestions);
        totalEl.textContent = quizData.length;
        totalBadge.textContent = quizData.length + " Fragen";
        filterQuestions();
    </script>
